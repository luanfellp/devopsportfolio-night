# ═══════════════════════════════════════════════════════════════
#  preview.yml — Preview por Pull Request
#
#  Cada PR recebe uma URL de preview no S3 isolada:
#    s3://<BUCKET>/previews/pr-<número>/
#
#  O bot comenta no PR com o link de acesso.
#  Quando o PR é fechado/mergeado, o preview é removido.
#
#  Secrets necessários (mesmos do deploy.yml + bucket público para preview):
#    AWS_ACCESS_KEY_ID
#    AWS_SECRET_ACCESS_KEY
#    AWS_REGION
#    S3_BUCKET_PREVIEW   ← pode ser o mesmo bucket, só muda o prefixo
#    CF_DISTRIBUTION_ID  ← necessário se o preview usa CloudFront
# ═══════════════════════════════════════════════════════════════

name: 🔍 Preview → Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  deploy-preview:
    name: 📦 Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'  # não roda se o PR foi fechado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy preview to S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws s3 sync ./dist \
            s3://${{ secrets.S3_BUCKET_PREVIEW }}/previews/pr-${PR_NUMBER}/ \
            --delete

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const bucket = process.env.S3_BUCKET_PREVIEW || '${{ secrets.S3_BUCKET_PREVIEW }}';

            // Ajuste a URL conforme seu setup (S3 website ou CloudFront)
            const previewUrl = `http://${bucket}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com/previews/pr-${pr}/`;

            const body = [
              `## 🔍 Preview Deploy`,
              ``,
              `✅ Preview gerado com sucesso para o PR #${pr}`,
              ``,
              `🔗 **URL:** ${previewUrl}`,
              ``,
              `| Info | Detalhe |`,
              `|------|---------|`,
              `| Commit | \`${{ github.sha }}\` |`,
              `| Branch | \`${{ github.head_ref }}\` |`,
              `| Atualizado | ${new Date().toISOString()} |`,
              ``,
              `> ⚠️ Preview será removido automaticamente quando o PR for fechado.`,
            ].join('\n');

            // Atualiza comentário existente ou cria novo
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('🔍 Preview Deploy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

  # ─────────────────────────────────────────────────────────────
  cleanup-preview:
    name: 🧹 Remove Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'  # só roda quando PR é fechado

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Remove preview from S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws s3 rm \
            s3://${{ secrets.S3_BUCKET_PREVIEW }}/previews/pr-${PR_NUMBER}/ \
            --recursive
          echo "Preview pr-${PR_NUMBER} removido."
